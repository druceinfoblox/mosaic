services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite+aiosqlite:////data/mosaic.db

  frontend:
    build: ./frontend
    ports:
      - "4173:80"
    depends_on:
      - backend
